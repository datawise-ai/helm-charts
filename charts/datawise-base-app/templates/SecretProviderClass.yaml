{{- range .Values.secretsVolumes }}
{{- if and .enabled .secret_arn }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  namespace: {{ include "datawise-base-app.namespace" $ }}    
  name: "{{ include "datawise-base-app.fullname" $ }}-{{ .name }}"
  labels:
    {{- include "datawise-base-app.labels" $ | nindent 4 }}
spec:
  provider: aws
  parameters:
    objects: |
        - objectName: {{ .secret_arn | quote }}
          objectAlias: {{ .subPath | quote }}
---
{{- end }}          
{{- end }}          
